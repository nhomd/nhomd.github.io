<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터넷비즈니스론 - D팀 A/B 테스트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6f7; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #222; margin-bottom: 5px; }
        .sub-title { color: #666; margin-bottom: 30px; font-size: 1.1em; }
        .container { display: flex; gap: 40px; max-width: 900px; width: 100%; justify-content: center; flex-wrap: wrap; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 340px; padding: 20px; text-align: center; border: 2px solid #eee; }
        .card.group-a { border-top: 6px solid #ff4d4d; }
        .card.group-b { border-top: 6px solid #2ecc71; }
        .badge { display: inline-block; padding: 6px 12px; border-radius: 20px; font-weight: bold; color: white; margin-bottom: 15px; }
        .group-a .badge { background-color: #ff4d4d; }
        .group-b .badge { background-color: #2ecc71; }
        .food-img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .price-box { background: #fff9e6; border: 1px dashed #ffd166; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.05em; margin: 15px 0; }
        .fee-text { color: #e63946; }
        .free-text { color: #2ecc7 green; font-weight: bold; }
        .btn { background-color: #ff5a5f; color: white; border: none; padding: 12px 0; width: 100%; border-radius: 6px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:hover { background-color: #e34247; }
    </style>
</head>
<body>

    <h1>배달비 표시 방식 A/B 테스트</h1>
    <div class="sub-title">인터넷비즈니스론 - D팀 (어떤 방식이 결제율을 높일까?)</div>

    <div class="container">
        <div class="card group-a">
            <span class="badge">A 그룹 (통제군)</span>
            <h3>간장 양념 치킨</h3>
            <div class="price-box">
                15,000원 미만 주문 시<br>
                <span class="fee-text">배달비 2,000원 부과</span>
            </div>
            <p style="color:#888; font-size:0.9em;">주문금액: 13,000원</p>
            <button class="btn" onclick="alert('A 그룹 결제 완료! (결제율 측정 완료)')">결제하기</button>
        </div>

        <div class="card group-b">
            <span class="badge">B 그룹 (실험군)</span>
            <h3>간장 양념 치킨</h3>
            <div class="price-box">
                15,000원 이상 주문하면<br>
                <span class="free-text" style="color: #2ecc71;">★ 무료 배달 ★</span>
            </div>
            <p style="color:#888; font-size:0.9em;">주문금액: 13,000원 (2,000원 추가 시 무료배달)</p>
            <button class="btn" onclick="alert('B 그룹 결제 완료! (결제율 15% 상승 효과 측정)')">결제하기</button>
        </div>
    </div>

</body>
</html>
