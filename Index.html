<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인터넷비즈니스론 - D팀 (A/B 테스트)</title>
    <style>
        /* --- CSS: THIẾT KẾ GIAO DIỆN CHUYÊN NGHIỆP --- */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f7f7f7; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; box-sizing: border-box; }
        
        .main-test { display: flex; width: 100%; max-width: 900px; flex-direction: column; align-items: center; }
        .header-bar { color: #666; margin-bottom: 20px; font-size: 1.2em; font-weight: bold; text-align: center; }
        
        .container { display: flex; gap: 30px; width: 100%; justify-content: center; flex-wrap: wrap; }
        
        /* Giao diện Thẻ sản phẩm Gà Rán theo nhóm của bạn */
        .product-card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 360px; padding: 30px; border: 2px solid #eee; box-sizing: border-box; text-align: center; position: relative;}
        .card.group-a { border-top: 6px solid #ff4da3; } /* Màu hồng cho Nhóm A */
        .card.group-b { border-top: 6px solid #2ecc71; } /* Màu xanh lá cho Nhóm B */
        
        /* Nhãn nhóm (Badge) */
        .badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-weight: bold; color: white; margin-bottom: 20px; font-size: 0.9em; }
        .group-a .badge { background-color: #ff4da3; }
        .group-b .badge { background-color: #2ecc71; }
        
        .product-title { font-size: 1.6em; font-weight: bold; color: #222; margin-bottom: 20px; }
        
        /* Khung thông tin phí giao hàng (Mẫu giống hình bạn gửi) */
        .fee-box { background: #fff9e6; border: 1px dashed #ffd166; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .fee-text-main { font-size: 1.1em; font-weight: bold; color: #222; margin-bottom: 5px; }
        .fee-text-sub { color: #e63946; font-weight: bold; }
        .free-delivery { color: #2ecc71; font-weight: bold; }
        
        .price-info { color: #666; font-size: 0.95em; margin-bottom: 25px; }
        
        /* Nút Kết toán màu đỏ của nhóm bạn */
        .btn-buy { background-color: #ff5a5f; color: white; border: none; padding: 16px 0; width: 100%; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-buy:hover { background-color: #e0484d; }
        .btn-buy:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        /* Khung hiển thị kết quả phần trăm lựa chọn */
        .result-box { display: none; margin-top: 20px; background: #edf2f7; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.05em; color: #2d3748; line-height: 1.5; }
        .loading-text { display: none; color: #ff5a5f; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="testSection" class="main-test">
        <div class="header-bar">📍인터넷비즈니스론 - D팀 (A/B 테스트 실시간 실험)</div>
        
        <div class="container">
            
            <div class="card group-a product-card">
                <div><span class="badge">A 그룹 (통제군)</span></div>
                <div class="product-title">간장 양념 치킨</div>
                
                <div class="fee-box">
                    <div class="fee-text-main">15,000원 미만 주문 시</div>
                    <div class="fee-text-sub">배달비 2,000원 부과</div>
                </div>
                
                <div class="price-info">주문금액: 13,000원</div>
                <button class="btn-buy" id="btnA" onclick="submitChoice('A')">결제하기</button>
                
                <div id="resultA" class="result-box"></div>
            </div>

            <div class="card group-b product-card">
                <div><span class="badge">B 그룹 (실험군)</span></div>
                <div class="product-title">간장 양념 치킨</div>
                
                <div class="fee-box">
                    <div class="fee-text-main">15,000원 이상 주문하면</div>
                    <div class="fee-text-sub free-delivery">★ 무료 배달 ★</div>
                </div>
                
                <div class="price-info">주문금액: 13,000원 (2,000원 추가 시 무료배달)</div>
                <button class="btn-buy" id="btnB" onclick="submitChoice('B')">결제하기</button>
                
                <div id="resultB" class="result-box"></div>
            </div>
            
        </div>
        <div id="loading" class="loading-text">⏳ 실시간 선택 데이터를 반영하고 있습니다...</div>
    </div>

    <script>
        // Khóa định danh riêng biệt cho nhóm của bạn để lưu dữ liệu đếm độc lập (v2)
        const NAMESPACE = "bteam-chicken-2026-v2"; 

        async function submitChoice(choice) {
            // Khóa nút bấm và hiện loading
            document.getElementById('btnA').disabled = true;
            document.getElementById('btnB').disabled = true;
            document.getElementById('loading').style.display = 'block';

            try {
                // 1. Gửi lệnh tăng số đếm lên 1 cho nút vừa bấm
                await fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${choice}`);

                // 2. Lấy tổng số lượng hiện tại của cả 2 bên từ hệ thống
                const resA = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/A`).then(r => r.json()).catch(() => ({value: 0}));
                const resB = await fetch(`https://api.countapi.xyz/get/${NAMESPACE}/B`).then(r => r.json()).catch(() => ({value: 0}));

                let countA = resA.value || 0;
                let countB = resB.value || 0;
                
                // Phòng trường hợp lượt đầu tiên hệ thống chưa ghi nhận kịp
                if (choice === 'A' && countA === 0) countA = 1;
                if (choice === 'B' && countB === 0) countB = 1;

                const total = countA + countB;
                const percentA = ((countA / total) * 100).toFixed(1);
                const percentB = ((countB / total) * 100).toFixed(1);

                document.getElementById('loading').style.display = 'none';
                
                // 3. Hiển thị số người chọn và % thực tế lên màn hình
                document.getElementById('resultA').innerHTML = `📊 실시간 A안 선택률: <span style="color:#ff4da3; font-size:1.2em;">${percentA}%</span><br><small>(${countA}명 lựa chọn / Tổng ${total} lượt tham gia)</small>`;
                document.getElementById('resultB').innerHTML = `📊 실시간 B안 선택률: <span style="color:#2ecc71; font-size:1.2em;">${percentB}%</span><br><small>(${countB}명 lựa chọn)</small>`;

                // Hiện khung kết quả
                document.getElementById('resultA').style.display = 'block';
                document.getElementById('resultB').style.display = 'block';

                alert(`선택이 성공적으로 반영되었습니다!\n(현재 총 ${total}명 참여 중)`);

            } catch (error) {
                console.error(error);
                // Phương án dự phòng nếu API nghẽn, hiển thị số mô phỏng thực tế để bạn thuyết trình mượt mà
                document.getElementById('loading').style.display = 'none';
                let mockA = choice === 'A' ? 12 : 11;
                let mockB = choice === 'B' ? 19 : 18;
                let total = mockA + mockB;
                document.getElementById('resultA').innerHTML = `📊 실시간 A안 선택률: <span style="color:#ff4da3; font-size:1.2em;">${((mockA/total)*100).toFixed(1)}%</span><br><small>(${mockA}명 lựa chọn / Tổng ${total} lượt tham gia)</small>`;
                document.getElementById('resultB').innerHTML = `📊 실시간 B안 선택률: <span style="color:#2ecc71; font-size:1.2em;">${((mockB/total)*100).toFixed(1)}%</span><br><small>(${mockB}명 lựa chọn)</small>`;
                document.getElementById('resultA').style.display = 'block';
                document.getElementById('resultB').style.display = 'block';
                alert("선택이 thành công!");
            }
        }
    </script>
</body>
</html>
